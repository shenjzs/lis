<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wybór Minigry</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #111;
            /* Możesz tu dodać obrazek tła, odkomentowując poniższą linijkę i podając ścieżkę do swojego pliku jpg/png */
            /* background-image: url('twoje-tlo.jpg'); */
            background-size: cover;
            background-position: center;
            overflow: hidden; /* Zapobiega pojawianiu się pasków przewijania */
        }

        .container {
            display: flex;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7); /* Przyciemnienie tła */
        }

        /* Styl dla pojedynczej kolumny (panelu) */
        .panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            text-decoration: none;
            color: white;
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            transition: background-color 0.3s ease, transform 0.2s;
            cursor: pointer;
            overflow: hidden;
        }

        .panel:last-child {
            border-right: none;
        }

        .panel:hover {
            background-color: rgba(255, 255, 255, 0.05);
        }

        /* Siatka z kropek, jak na screenie */
        .grid-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: radial-gradient(rgba(255, 255, 255, 0.1) 1px, transparent 1px);
            background-size: 6px 6px; /* Zmiana gęstości kropek */
            pointer-events: none;
            z-index: 1;
        }

        /* Kolorowe gradienty tła dla poszczególnych paneli */
        .panel-1 { background: linear-gradient(to bottom, rgba(0,229,255,0.05), transparent); }
        .panel-2 { background: linear-gradient(to bottom, rgba(255,234,0,0.05), transparent); }
        .panel-3 { background: linear-gradient(to bottom, rgba(255,0,127,0.05), transparent); }
        .panel-4 { background: linear-gradient(to bottom, rgba(0,255,85,0.05), transparent); }

        .logo {
            font-size: 40px;
            font-weight: bold;
            text-align: center;
            z-index: 2;
            letter-spacing: -1px;
        }

        .action-area {
            position: absolute;
            bottom: 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 2;
        }

        .bottom-line {
            width: 150px;
            height: 2px;
            margin-bottom: 25px;
            background-color: white;
            opacity: 0.8;
            transition: width 0.3s, opacity 0.3s;
        }

        .panel:hover .bottom-line {
            width: 200px;
            opacity: 1;
        }

        .action-text {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #fff;
            font-weight: 600;
        }

        /* Kolory specyficzne dla każdego panelu (napisy i podświetlenia) */
        
        /* Panel 1 - Turkusowy (REALM styl) */
        .panel-1 .logo { color: white; }
        .panel-1 .bottom-line { background-color: #00e5ff; box-shadow: 0 0 12px #00e5ff; }

        /* Panel 2 - Żółty/Pomarańczowy (intouch styl) */
        .panel-2 .logo { color: white; }
        .panel-2 .bottom-line { background-color: #ffea00; box-shadow: 0 0 12px #ffea00; }

        /* Panel 3 - Różowy (onbeat styl) */
        .panel-3 .logo { color: #ff007f; }
        .panel-3 .bottom-line { background-color: #ff007f; box-shadow: 0 0 12px #ff007f; }

        /* Panel 4 - Zielony (offbeat styl) */
        .panel-4 .logo { color: #00ff55; }
        .panel-4 .bottom-line { background-color: #00ff55; box-shadow: 0 0 12px #00ff55; }

        /* Wygląd zablokowanych opcji */
        .disabled-panel {
            cursor: not-allowed;
            filter: grayscale(0.5);
        }
        
        .disabled-panel .bottom-line {
            background-color: #555 !important;
            box-shadow: none !important;
        }
        .disabled-panel:hover {
            background-color: transparent;
        }

    </style>
</head>
<body>

    <div class="container">
        <a href="lightsout.html" class="panel panel-1">
            <div class="grid-overlay"></div>
            <div class="logo">Lights Out</div>
            
            <div class="action-area">
                <div class="bottom-line"></div>
                <div class="action-text">WYBIERZ GRĘ</div>
            </div>
        </a>
        
        <a href="alarm.html" class="panel panel-2">
            <div class="grid-overlay"></div>
            <div class="logo">Alarm</div>
            
            <div class="action-area">
                <div class="bottom-line"></div>
                <div class="action-text">WYBIERZ GRĘ</div>
            </div>
        </a>
        
        <a href="ammunation.html" class="panel panel-3">
            <div class="grid-overlay"></div>
            <div class="logo">Ammunation</div>
            
            <div class="action-area">
                <div class="bottom-line"></div>
                <div class="action-text">WYBIERZ GRĘ</div>
            </div>
        </a>
        
        <a href="jacht.html" class="panel panel-4">
            <div class="grid-overlay"></div>
            <div class="logo">Jacht</div>
            
            <div class="action-area">
                <div class="bottom-line"></div>
                <div class="action-text">WYBIERZ GRĘ</div>
            </div>
        </a>
    </div>

</body>
</html>
